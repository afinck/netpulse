[target.armv7-unknown-linux-gnueabihf]
image = "ghcr.io/cross-rs/armv7-unknown-linux-gnueabihf:latest"
xargo = false

# System dependencies for armhf (32-bit ARM)
[target.armv7-unknown-linux-gnueabihf.env]
PKG_CONFIG_PATH = "/usr/lib/arm-linux-gnueabihf/pkgconfig"
SQLITE3_LIB_DIR = "/usr/lib/arm-linux-gnueabihf"

# Pre-build commands to install dependencies
[target.armv7-unknown-linux-gnueabihf.pre-build]
commands = [
    "dpkg --add-architecture armhf",
    "apt-get update",
    "apt-get install -y libsqlite3-dev:armhf",
]

# For 64-bit ARM (Raspberry Pi 3/4 with 64-bit OS)
[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:latest"
xargo = false

[target.aarch64-unknown-linux-gnu.env]
PKG_CONFIG_PATH = "/usr/lib/aarch64-linux-gnu/pkgconfig"
SQLITE3_LIB_DIR = "/usr/lib/aarch64-linux-gnu"

[target.aarch64-unknown-linux-gnu.pre-build]
commands = [
    "apt-get update",
    "apt-get install -y libsqlite3-dev:arm64",
]